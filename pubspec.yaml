name: smartwear_ai
description: Smartwear AI app scaffold with clean architecture.
publish_to: none

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  go_router: ^14.2.0

  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  flutter_blue_plus: ^1.32.8
  fl_chart: ^0.68.0
  pedometer: ^4.0.1
  health: ^11.1.1

  firebase_core: ^3.4.1
  firebase_auth: ^5.2.1
  cloud_firestore: ^5.4.1
  google_sign_in: ^7.2.0

  flutter_local_notifications: ^17.2.2
  timezone: ^0.9.2
  http: ^1.2.2
  flutter_dotenv: ^5.0.2
  shared_preferences: ^2.3.2
  google_fonts: ^6.2.1
  permission_handler: ^11.3.1
  image_picker: ^1.2.1
  package_info_plus: ^9.0.1
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png

flutter_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"